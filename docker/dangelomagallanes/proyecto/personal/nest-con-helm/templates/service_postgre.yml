apiVersion: v1
kind: Service
metadata:
  name: postgre-service
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: {{ .Values.postgres.name }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
    - name: ssh
      port: 3456
      targetPort: 3456
      nodePort: {{ .Values.postgres.service.sshNodePort }}
