createNamespace: false

app:
  name: webnest
  image:
    repository: dangekid/nginxpokeapi
    tag: latest
    pullPolicy: Always
  container:
    name: webnest
    port: 3001
    replicas: 2
  service:
    type: NodePort
    port: 3001
    nodePort: 30010
  ingress:
    enabled: true
    host: api.dangelomagallanes.me
    port: 3001
  env:
    DB_PORT: "5432"
    PORT: "3001"
  readiness:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5

postgres:
  name: postgre
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    database: pokemondb
    username: pokemonuser
    password: pokemonpass123
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: "microk8s-hostpath"
