services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_pokemon
    environment:
      POSTGRES_USER: pokemonuser
      POSTGRES_PASSWORD: pokemonpass123
      POSTGRES_DB: pokemondb
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      pnautocaravaneando:
        ipv4_address: 192.168.25.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemonuser -d pokemondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: /home/dangelo/HLC-NEST-POSTSQL/docker/dangelomagallanes/
      dockerfile: ./dockerfiles/nginxpokeapi/damgnginxpokeapi
      args:
        - INICIALES=damg
    container_name: ctdamgnginxpokeapi
    image: dangekid/nginxpokeapi
    ports:
      - 3010:3001
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres_pokemon
      DB_PORT: 5432
      DB_USER: pokemonuser
      DB_PASSWORD: pokemonpass123
      DATABASE: pokemondb
      PORT: 3050
    volumes:
      - ./logs:/root/logs
    networks:
      pnautocaravaneando:
        ipv4_address: ${IP_WEB}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  pnautocaravaneando:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}
