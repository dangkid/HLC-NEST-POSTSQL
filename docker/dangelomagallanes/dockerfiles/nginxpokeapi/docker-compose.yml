# Docker Compose - Capa 7: nginxpokeapi (FINAL NestJS)
# NestJS con Nginx proxy → puerto 3001 → NestJS en 3050
# FROM dangekid/pokeapi
# Incluye PostgreSQL para ser totalmente funcional
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_pokemon
    environment:
      POSTGRES_USER: pokemonuser
      POSTGRES_PASSWORD: pokemonpass123
      POSTGRES_DB: pokemondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemonuser -d pokemondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginxpokeapi:
    image: dangekid/nginxpokeapi
    build:
      context: ../../
      dockerfile: dockerfiles/nginxpokeapi/damgnginxpokeapi
    container_name: ctdamg_nginxpokeapi
    ports:
      - "3001:3001"  # Nginx proxy → NestJS
      - "3456:3456"  # SSH
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pokemonuser
      DB_PASSWORD: pokemonpass123
      DATABASE: pokemondb
      PORT: "3050"
      CONTENEDOR: ctdamg_nginxpokeapi
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
