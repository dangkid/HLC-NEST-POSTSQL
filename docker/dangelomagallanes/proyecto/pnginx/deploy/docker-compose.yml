services:
  web:
    build:
      context: /home/dangelo/HLC-NEST-POSTSQL/docker/dangelomagallanes/
      dockerfile: ./dockerfiles/sweb/nginx/damgnginx
      args:
        - INICIALES=damg
    container_name: ctdamgnginx
    image: dangelomagallanes/nginx1
    ports:
      - 6969:80
    env_file:
      - ./.env
    volumes:
      - ./logs:/root/logs
    networks:
      pnginx_network:
        ipv4_address: 192.168.22.3
networks:
  pnginx_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.22.0/24
