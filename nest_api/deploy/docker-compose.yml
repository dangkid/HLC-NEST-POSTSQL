version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    container_name: pokemon-api-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      pokemon_network:
        ipv4_address: ${IP_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    container_name: pokemon-api-app
    build:
      context: ../../
      dockerfile: ./deploy/build_img/Dockerfile
    image: dangelomagallanes/nest-api:latest
    ports:
      - "${EXTERNAL_API_PORT}:${API_PORT}"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE: ${DATABASE}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
    env_file:
      - ./.env
    volumes:
      - ./logs:/root/logs
    networks:
      pokemon_network:
        ipv4_address: ${IP_WEB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  pokemon_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}

volumes:
  postgres_data:
    driver: local
